<div *ngIf="isOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
  <div class="bg-white dark:bg-[#0c1a3d] w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-gray-200 dark:border-gray-800">
    
    <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
      <button *ngIf="view !== 'menu'" (click)="view === 'group-details' ? view = 'select-friends' : view = 'menu'" 
              class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors text-gray-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      
      <div class="flex-1">
        <h2 class="text-lg font-bold text-gray-800 dark:text-white">
          {{ view === 'menu' ? 'New Chat' : view === 'select-friends' ? 'Add Members' : 'New Group' }}
        </h2>
        <p *ngIf="view === 'select-friends'" class="text-xs text-gray-500">{{selectedUserIds.size}} selected</p>
      </div>

      <button (click)="close()" class="p-2 cursor-pointer text-gray-400 hover:text-gray-600 hover:bg-gray-200 hover:rounded-full"><i class="material-icons text-base">close</i></button>
    </div>

    <div *ngIf="view === 'menu'" class="p-2 animate-in fade-in duration-200">
      <button (click)="view = 'select-friends'" class="w-full flex items-center gap-4 p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50 rounded-xl transition-all">
        <div class="w-11 h-11 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/></svg>
        </div>
        <div class="text-left">
          <div class="font-bold text-gray-800 dark:text-gray-100">New Group</div>
          <p class="text-xs text-gray-500">Create a group chat with friends</p>
        </div>
      </button>
      </div>

    <div *ngIf="view === 'select-friends'" class="flex flex-col h-[450px] animate-in slide-in-from-right duration-200">
      <div class="px-4 py-2">
        <div class="relative">
          <input [(ngModel)]="searchTerm" (input)="filterFriends()" placeholder="Search contacts..." 
                 class="w-full pl-10 pr-4 py-2.5 bg-gray-100 dark:bg-gray-800 rounded-xl border-none text-sm dark:text-white focus:ring-2 ring-blue-500 outline-none">
          <svg class="absolute left-3 top-3 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto py-2 custom-scrollbar">
        <div *ngFor="let friend of filteredFriends" (click)="toggleSelection(friend.userId)" 
             class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-800/40 cursor-pointer transition-colors">
          <div class="relative">
            <img [src]="getProfilePic(friend)" class="w-12 h-12 rounded-full object-cover">
            <div *ngIf="selectedUserIds.has(friend.userId)" class="absolute -bottom-1 -right-1 bg-blue-600 rounded-full border-2 border-white dark:border-[#0c1a3d] p-0.5">
              <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>
            </div>
          </div>
          <span class="flex-1 font-medium text-gray-700 dark:text-gray-200">{{friend.userName}}</span>
        </div>
      </div>

      <div class="p-4 border-t border-gray-100 dark:border-gray-800">
        <button [disabled]="selectedUserIds.size === 0" (click)="view = 'group-details'"
                class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-bold rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-95">
          NEXT
        </button>
      </div>
    </div>

    <div *ngIf="view === 'group-details'" class="p-6 animate-in slide-in-from-right duration-200">
      <div class="flex flex-col items-center mb-6">
        <div class="w-20 h-20 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center text-gray-400 mb-4 border-2 border-dashed border-gray-600">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-width="2"/><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/></svg>
        </div>
        <input [(ngModel)]="groupName" type="text" placeholder="Group Name..." 
               class="w-full text-center p-3 bg-transparent border-b-2 border-blue-500 focus:outline-none text-xl font-bold dark:text-white">
        <p class="text-xs text-gray-500 mt-2 uppercase tracking-widest font-semibold">Provide a group subject</p>
      </div>
      
      <div *ngIf="error" class="bg-red-500/10 border border-red-500/20 text-red-500 p-3 rounded-lg text-sm mb-4">
        {{error}}
      </div>

      <button [disabled]="!isGroupValid() || loading" (click)="createGroup()"
              class="w-full py-4 bg-green-600 hover:bg-green-700 disabled:bg-gray-600 text-white font-bold rounded-xl shadow-xl transition-all flex items-center justify-center gap-2">
        <span *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        {{ loading ? 'CREATING...' : 'CREATE GROUP' }}
      </button>
    </div>

  </div>
</div>
