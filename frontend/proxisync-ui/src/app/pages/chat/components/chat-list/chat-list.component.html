<div class="h-full flex flex-col bg-white dark:bg-slate-900">

  <!-- Header -->
  <div class="h-16 px-4 flex items-center justify-between border-b dark:border-slate-800">
    <h2 class="font-semibold text-lg">Chats</h2>
    <span class="material-icons text-slate-500">more_vert</span>
  </div>

  <!-- Search -->
  <div class="p-3">
    <input type="text"
      placeholder="Search chats"
      class="w-full rounded-lg bg-slate-100 dark:bg-slate-800 px-4 py-2 text-sm outline-none">
  </div>

  <!-- Chat Items -->
  <div class="flex-1 overflow-y-auto">
    <div *ngFor="let c of conversations"
         (click)="openChat(c)"
         class="flex items-center px-3 py-3 cursor-pointer transition hover:bg-slate-100 dark:hover:bg-slate-800"
         [class.bg-slate-200]="c.conversationId === activeId"
         [class.dark:bg-slate-800]="c.conversationId === activeId">

      <!-- Avatar -->
      <div class="relative mr-3">
        <img [src]="c.profilePictureUrl || 'assets/avatar.png'"
             class="w-11 h-11 rounded-full object-cover">
        <span *ngIf="c.isOnline"
              class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></span>
      </div>

      <!-- Middle -->
      <div class="flex-1 min-w-0">
        <div class="flex justify-between">
          <p class="font-medium truncate">{{ c.name }}</p>
          <small class="text-xs text-slate-500">{{ c.lastMessageSentAt | date:'shortTime' }}</small>
        </div>

        <div class="flex justify-between items-center">
          <p class="text-sm text-slate-500 truncate">
            {{ c.lastMessageContent || 'No messages yet' }}
          </p>

          <span *ngIf="c.unreadCount > 0"
                class="ml-2 bg-green-500 text-white text-xs px-2 py-0.5 rounded-full">
            {{ c.unreadCount }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
