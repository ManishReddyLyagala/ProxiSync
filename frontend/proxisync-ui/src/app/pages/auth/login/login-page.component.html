<div class="min-h-screen w-full bg-white relative overflow-hidden font-sans flex items-center justify-center">
  
  <div class="absolute top-0 left-0 w-full h-[50vh] bg-gradient-to-br from-cyan-400 to-blue-500 z-0">
    <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-[0]">
      <svg class="relative block w-[calc(100%+1.3px)] h-24 md:h-40" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs>
          <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
        </defs>
        <g>
          <use href="#gentle-wave" xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.7)" class="animate-wave-slow" />
          <use href="#gentle-wave" xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.5)" class="animate-wave-mid" />
          <use href="#gentle-wave" xlink:href="#gentle-wave" x="48" y="7" fill="#ffffff" class="animate-wave-fast" />
        </g>
      </svg>
    </div>
  </div>

  <div class="absolute top-6 left-6 z-20 flex items-center gap-2 animate-in fade-in slide-in-from-left duration-700">
    <div class="w-9 h-9 bg-white/10 backdrop-blur-md border border-white/20 rounded-lg flex items-center justify-center shadow-lg">
      <i class="material-icons text-white text-xl">sms</i>
    </div>
    <span class="text-lg font-black text-white tracking-tighter uppercase">ProxiSync</span>
  </div>

  <div class="relative z-10 w-full max-w-[380px] px-6 animate-in fade-in zoom-in duration-500">
    <div class="bg-white rounded-[32px] shadow-[0_15px_50px_-12px_rgba(0,0,0,0.1)] p-8 border border-gray-50">
      <div *ngIf="!showRestoreUI; else restoreTemplate">
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Login</h2>
        <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mt-1">Welcome back</p>
      </div>

      <form (ngSubmit)="submit()" #loginForm="ngForm" class="space-y-6">
        <div class="group relative">
          <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest absolute -top-2.5 left-0 transition-all group-focus-within:text-blue-500">
            Email or Username
          </label>
          <input type="text" name="username" [(ngModel)]="username" required
                 placeholder="Enter Email or Username"
                 class="w-full mt-1 pt-2 pb-1.5 border-b border-gray-100 focus:border-blue-400 outline-none transition-all text-sm text-gray-700 font-medium placeholder:text-gray-200 bg-transparent">
        </div>

        <div class="group relative">
          <label class="text-[9px] font-bold text-gray-400 uppercase tracking-widest absolute -top-2.5 left-0 transition-all group-focus-within:text-blue-500">
            Password
          </label>
          <input type="password" name="password" [(ngModel)]="password" required
                 placeholder="Enter Password"
                 class="w-full mt-1 pt-2 pb-1.5 border-b border-gray-100 focus:border-blue-400 outline-none transition-all text-sm text-gray-700 font-medium placeholder:text-gray-200 bg-transparent">
        </div>

        <div class="pt-2">
          <button type="submit" [disabled]="loading || (username == '' || password == '')"
                  class="w-full py-3 cursor-pointer bg-gradient-to-r from-cyan-400 to-blue-500 hover:shadow-cyan-200 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.97] flex items-center justify-center uppercase tracking-widest text-[10px] disabled:opacity-70 disabled:cursor-not-allowed">
            <span *ngIf="!loading">LogIn</span>
            
            <svg *ngIf="loading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>
        </div>
      </form>

      <div *ngIf="error" class="bg-red-50 text-red-600 text-[11px] font-bold p-3 rounded-xl mt-4 text-center animate-in fade-in slide-in-from-top-1">
        {{error}}
      </div>

      <div class="flex items-center my-6">
        <div class="flex-1 h-[1px] bg-gray-50"></div>
        <span class="px-3 text-[9px] font-bold text-gray-300 uppercase">Or</span>
        <div class="flex-1 h-[1px] bg-gray-50"></div>
      </div>

      <button type="button" class="w-full flex items-center justify-center gap-2 py-2.5 border border-gray-100 rounded-xl hover:bg-gray-50 transition-all shadow-sm">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4">
        <span class="text-xs font-bold text-gray-500">Google</span>
      </button>

      <p class="mt-6 text-center text-[10px] text-gray-400 font-bold uppercase tracking-tighter">
        New User? <a routerLink="/register" class="text-cyan-500 hover:underline ml-1">Register</a>
      </p>
      </div>

      <ng-template #restoreTemplate>
        <div class="text-center animate-in fade-in zoom-in duration-300">
          <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="material-icons text-blue-500 text-3xl">settings_backup_restore</i>
          </div>
          
          <h2 class="text-xl font-bold text-gray-900 tracking-tight">Restore Account?</h2>
          <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mt-1 mb-6">Account Deactivated</p>
          
          <p class="text-sm text-gray-600 leading-relaxed mb-8">
            Welcome back, <span class="font-bold text-gray-900">{{tempUserData?.displayName}}</span>. 
            Your account is currently inactive. Would you like to restore it and access your chats?
          </p>

          <div class="space-y-3">
            <button (click)="confirmRestore()" [disabled]="loading"
              class="w-full py-3 bg-gradient-to-r from-cyan-400 to-blue-500 text-white font-bold rounded-xl shadow-lg transition-all active:scale-[0.97] flex items-center justify-center uppercase tracking-widest text-[10px]">
              <span *ngIf="!loading">Yes, Restore Account</span>
              <svg *ngIf="loading" class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>

            <button (click)="showRestoreUI = false" [disabled]="loading"
              class="w-full py-3 bg-gray-50 hover:bg-gray-100 text-gray-500 font-bold rounded-xl transition-all uppercase tracking-widest text-[10px]">
              Cancel
            </button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</div>
