    <div [class.dark]="dark()" class="min-h-screen bg-gray-50 dark:bg-slate-950 flex flex-col lg:flex-row overflow-hidden">
  
  @if(storage.getUser() && !router.url.includes('/chats/conv')){
  <header class="lg:hidden h-14 flex items-center justify-between px-4 bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 z-30 shadow-sm">
  <div class="flex flex-1 items-center">
    <button (click)="sidebar.toggleMobile()" 
            class="p-2 mr-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg transition-colors focus:outline-none">
      <span class="material-icons text-slate-600 dark:text-slate-300">menu</span>
    </button>
    
    <h1 class="text-lg font-bold text-slate-800 dark:text-white tracking-tight">ProxiSync</h1>
  </div>
  <div class="relative w-9 h-9 rounded-full overflow-hidden border-2 border-blue-500/20 dark:border-blue-400/30 shadow-sm" (click)="router.navigate(['/profile'])">
    <img 
      [src]="getProfilePicUrl(storage.getUser()?.profilePictureUrl || '/assets/avatar.png')"
      alt="User Profile" 
      class="w-full h-full object-cover"
    />
  </div>
</header>
}

  <app-sidebar #sidebar (toggle)="onSidebarToggle($event)"></app-sidebar> 

  <main class="flex-1 flex flex-col min-w-0 transition-all duration-300 ease-in-out"
          [style.margin-left.px]="isMobileView() ? 0 : storage.getUser() ? (sidebarExpanded ? 256 : 64): 0">
    <div class="flex-1 flex flex-col h-full">
        <router-outlet></router-outlet>
      </div>
    <app-call-overlay></app-call-overlay>
  </main>

</div>
